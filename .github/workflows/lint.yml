name: Lint & Format Check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: actions/cache@v4
        with:
          path: .cache
          key: ${{ runner.os }}-ci-cache-${{ hashFiles('package-lock.json', 'eslint.config.ts', 'tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-ci-cache-
      - run: npm ci
      - run: npm run check
      - run: npm run typecheck
      - run: npm run lint
      - run: npx prettier --check .
