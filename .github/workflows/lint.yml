name: Lint, Typecheck, and Format
run-name: Lint, Typecheck, and Format (${{ github.event_name }})

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint, Typecheck, and Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - uses: actions/cache@v5
        with:
          path: .cache
          key: ${{ runner.os }}-ci-cache-${{ hashFiles('package-lock.json', 'eslint.config.ts', 'tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-ci-cache-
      - run: npm ci
      - run: npm run ban-js
      - run: npm run check
      - run: npm run typecheck
      - run: npm run lint
      - run: npx prettier --check .
